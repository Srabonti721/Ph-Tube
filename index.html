<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH TUBE</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active {
            background-color: #FF1F3D;
            color: white;
        }
    </style>
</head>

<body>
    <!-- navbar -->
    <header>
        <nav class=" w-11/12 my-4 mx-auto flex justify-between border-b-2 border-[#17171720] py-5">
            <div>
                <img class="w-[120px]" src="assest/Logo.png" alt="">
            </div>
            <div class="shot">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search" />
                </label>
            </div>
            <div class="blog ">
                <button class="btn bg-[#FF1F3D] text-white">Shot By View</button>
            </div>
        </nav>
    </header>
    <!-- button -->
    <nav id="categories-container" class="flex justify-center py-5 gap-5">
        <div>
            <button id="all-btn" onclick="loadVideo()" class="btn-sm btn ">ALL</button>
        </div>
    </nav>
<!-- loader -->
 <section id="loader" class="text-center py-14 hidden" >
<span class="loading loading-dots loading-xl"></span>
 </section>
     
    <!-- video -->
    <section id="video-container" class="w-11/12 mx-auto grid grid-cols-4 gap-4">
        <div class="col-span-full flex flex-col justify-center items-center text-center py-20">
            <img class="w-[120px]" src="assest/Icon.png" alt="">
            <h2 class="text-2xl font-bold">Oops!! Sorry, There is no content here</h2>
        </div>

    </section>

    <dialog id="videoDetails" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="script/index.js"></script>
</body>

</html>
