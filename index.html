<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH TUBE</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active {
            background-color: #FF1F3D;
            color: white;
        }
    </style>
</head>

<body>
    <!-- navbar -->
    <header>
        <nav class=" w-11/12 my-4 mx-auto flex justify-between border-b-2 border-[#17171720] py-5">
            <div>
                <img class="w-[120px]" src="assest/Logo.png" alt="">
            </div>
            <div class="shot">
                <button class="btn">Shot By View</button>
            </div>
            <div class="blog ">
                <button class="btn bg-[#FF1F3D] text-white">Blog</button>
            </div>
        </nav>
    </header>
    <!-- button -->
    <nav id="categories-container" class="flex justify-center py-5 gap-5">
        <div>
            <button id="all-btn" onclick="loadVideo()" class="btn-sm btn ">ALL</button>
        </div>
    </nav>
    <!-- video -->
    <section id="video-container" class="w-11/12 mx-auto grid grid-cols-4 gap-4">
        <div class="col-span-full flex flex-col justify-center items-center text-center py-20">
            <img class="w-[120px]" src="assest/Icon.png" alt="">
            <h2 class="text-2xl font-bold">Oops!! Sorry, There is no content here</h2>
        </div>

    </section>
        <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog  id="videoDetails"  class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
<div id="details-container">

</div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>


    <script src="script/index.js" ></script>
</body>

</html>
